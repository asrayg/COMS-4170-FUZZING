openapi: "3.0.3"
info:
  title: Graylayer Orderbook History API
  version: "1.0"
  description: >
    OpenAPI specification for the Graylayer Orderbook History API, authored
    from https://docs.graylayer.tech/orderbook-api/endpoints. Serves historical
    orderbook data (snapshots + deltas) from Kalshi, Gemini, and Polymarket US.
    History begins 2026-03-07. Anonymous access is restricted to the last 1 day.

servers:
  - url: http://data.graylayer.tech
    description: Graylayer Orderbook History service

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Error:
      type: object
      properties:
        error:   { type: string }
        message: { type: string }

    TickerList:
      type: object
      required: [exchange, count, tickers]
      properties:
        exchange: { type: string }
        count:    { type: integer, minimum: 0 }
        tickers:
          type: array
          items: { type: string }

    SnapshotRow:
      type: object
      required: [ts, side, price, quantity]
      properties:
        ts:       { type: string, format: date-time }
        side:     { type: string, enum: [bid, ask] }
        price:    { type: string, pattern: '^-?\d+(\.\d+)?$' }
        quantity: { type: string, pattern: '^-?\d+(\.\d+)?$' }

    SnapshotResponse:
      type: object
      required: [exchange, ticker, count, rows]
      properties:
        exchange: { type: string }
        ticker:   { type: string }
        count:    { type: integer, minimum: 0 }
        rows:
          type: array
          items: { $ref: "#/components/schemas/SnapshotRow" }

    DeltaRow:
      type: object
      required: [ts, sequence, side, price, quantity_delta]
      properties:
        ts:             { type: string, format: date-time }
        sequence:       { type: integer, format: int64 }
        side:           { type: string, enum: [bid, ask] }
        price:          { type: string, pattern: '^-?\d+(\.\d+)?$' }
        quantity_delta: { type: string, pattern: '^-?\d+(\.\d+)?$' }

    DeltaResponse:
      type: object
      required: [exchange, ticker, count, rows]
      properties:
        exchange: { type: string }
        ticker:   { type: string }
        count:    { type: integer, minimum: 0 }
        rows:
          type: array
          items: { $ref: "#/components/schemas/DeltaRow" }

security:
  - ApiKeyAuth: []
  - {}  # allow anonymous (rate-limited, clamped to last 1 day)

paths:

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      tags: [health]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }

  /api/{exchange}/tickers:
    get:
      summary: List tickers for an exchange
      operationId: listTickers
      tags: [tickers]
      parameters:
        - name: exchange
          in: path
          required: true
          schema:
            type: string
            enum: [kalshi, gemini, polymarket_us]
        - name: prefix
          in: query
          required: false
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Ticker list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TickerList" }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "429": { description: Rate limit exceeded }

  /api/{exchange}/snapshots/{ticker}:
    get:
      summary: Get orderbook snapshot rows
      operationId: getSnapshots
      tags: [snapshots]
      parameters:
        - name: exchange
          in: path
          required: true
          schema:
            type: string
            enum: [kalshi, gemini, polymarket_us]
        - name: ticker
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 256 }
        - name: start_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: end_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 10000 }
      responses:
        "200":
          description: Snapshot rows
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SnapshotResponse" }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "404": { description: Ticker not found }
        "429": { description: Rate limit exceeded }

  /api/{exchange}/deltas/{ticker}:
    get:
      summary: Get orderbook delta rows
      operationId: getDeltas
      tags: [deltas]
      parameters:
        - name: exchange
          in: path
          required: true
          schema:
            type: string
            enum: [kalshi, gemini, polymarket_us]
        - name: ticker
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 256 }
        - name: start_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: end_ts
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 10000 }
      responses:
        "200":
          description: Delta rows
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeltaResponse" }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "404": { description: Ticker not found }
        "429": { description: Rate limit exceeded }
