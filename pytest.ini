[pytest]
pythonpath = .
testpaths = tests
addopts =
    -ra
    --strict-markers
    --tb=short
    --html=results/pytest_report.html
    --self-contained-html
    --json-report
    --json-report-file=results/pytest_report.json
markers =
    gateway: tests that hit gateway.graylayer.tech (Market Proxy)
    data: tests that hit data.graylayer.tech (Orderbook History)
    negative: explicitly malformed requests
    stateful: stateful / linked-operation tests
    differential: cross-endpoint consistency checks
    slow: long-running fuzz runs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
